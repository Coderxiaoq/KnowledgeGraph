services:
  frontend:
    container_name: career-kg-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - career-kg-net

  backend:
    container_name: career-kg-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NEO4J_URI=${NEO4J_URI:-bolt://host.docker.internal:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
    extra_hosts:
      - "host.docker.internal:host-gateway"
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - career-kg-net

networks:
  career-kg-net:
    driver: bridge
