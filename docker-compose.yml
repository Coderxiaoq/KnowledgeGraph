services:
  frontend:
    container_name: career-kg-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - career-kg-net

  backend:
    container_name: career-kg-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - career-kg-net

networks:
  career-kg-net:
    driver: bridge
